<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#dbeafe,#f0fdf4);
            min-height:100vh;
        }

        .success-card{
            max-width:700px;
            margin:auto;
            margin-top:60px;
            border:none;
            border-radius:20px;
            box-shadow:0 15px 35px rgba(0,0,0,0.15);
        }

        .tick{
            font-size:60px;
        }
    </style>
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container">

    <div class="card success-card p-5 text-center">

        <div class="tick">✅</div>

        <h2 class="mt-3">Payment Successful</h2>

        <h4 class="text-success">Booking Confirmed ✈</h4>

        <hr>

        <p><strong>PNR:</strong> AI2026001</p>
        <p><strong>Flight:</strong> IndiGo 6E101</p>
        <p><strong>Route:</strong> Chennai → Delhi</p>
        <p><strong>Seat:</strong> A12</p>
        <p><strong>Status:</strong> Confirmed</p>

        <a href="/ticket"
           class="btn btn-primary mt-3">
            View Ticket
        </a>

    </div>

</div>

</body>
</html>
