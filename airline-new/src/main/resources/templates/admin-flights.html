<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Flights</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">

    <h2 class="mb-4 text-center">Manage Flights ✈</h2>

    <div class="table-responsive">

        <table class="table table-bordered table-striped shadow bg-white">

            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Flight Name</th>
                <th>Source</th>
                <th>Destination</th>
                <th>Departure</th>
                <th>Arrival</th>
                <th>Seats</th>
                <th>Price</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="flight : ${flights}">
                <td th:text="${flight.flightId}"></td>
                <td th:text="${flight.flightName}"></td>
                <td th:text="${flight.source}"></td>
                <td th:text="${flight.destination}"></td>
                <td th:text="${flight.departureTime}"></td>
                <td th:text="${flight.arrivalTime}"></td>
                <td th:text="${flight.seatsAvailable}"></td>
                <td th:text="${flight.price}"></td>

                <td>
                    <a th:href="@{/delete-flight/{id}(id=${flight.flightId})}"
                       class="btn btn-danger btn-sm">
                        Delete
                    </a>
                </td>
            </tr>
            </tbody>

        </table>

    </div>

</div>

</body>
</html>
