<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking History</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container mt-5">

    <h2 class="text-center mb-4">✈ Booking History</h2>

    <div class="card shadow p-4">

        <table class="table table-bordered table-hover text-center align-middle">

            <thead class="table-dark">
                <tr>
                    <th>Reservation ID</th>
                    <th>Passenger ID</th>
                    <th>Flight ID</th>
                    <th>Seat Number</th>
                    <th>PNR</th>
                    <th>Status</th>
                    <th>Booking Date</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="booking : ${bookings}">
                    <td th:text="${booking.reservationId}"></td>
                    <td th:text="${booking.passengerId}"></td>
                    <td th:text="${booking.flightId}"></td>
                    <td th:text="${booking.seatNumber}"></td>
                    <td th:text="${booking.pnr}"></td>

                    <td>
                        <span class="badge bg-success"
                              th:if="${booking.bookingStatus == 'CONFIRMED'}">
                            CONFIRMED
                        </span>

                        <span class="badge bg-danger"
                              th:if="${booking.bookingStatus == 'CANCELLED'}">
                            CANCELLED
                        </span>
                    </td>

                    <td th:text="${booking.bookingDate}"></td>

                    <td>
                        <a class="btn btn-danger btn-sm"
                           th:if="${booking.bookingStatus == 'CONFIRMED'}"
                           th:href="@{/cancel/{id}(id=${booking.reservationId})}">
                            Cancel
                        </a>

                        <span class="text-muted"
                              th:if="${booking.bookingStatus == 'CANCELLED'}">
                            Cancelled
                        </span>
                    </td>
                </tr>
            </tbody>

        </table>

    </div>

</div>

</body>
</html>
