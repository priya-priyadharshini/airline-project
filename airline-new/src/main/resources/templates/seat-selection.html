<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Select Seat</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f8fafc;
        }

        .seat{
            width:60px;
            height:60px;
            margin:8px;
            border:none;
            border-radius:12px;
            background:#22c55e;
            color:white;
            font-weight:bold;
            cursor:pointer;
        }

        .seat.selected{
            background:#2563eb;
        }

        .seat-map{
            display:flex;
            flex-wrap:wrap;
            max-width:320px;
            margin:auto;
        }
    </style>
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container text-center mt-5">

    <h2>Select Your Seat ✈</h2>
    <p>Choose your preferred seat</p>

    <form action="/payment" method="get">

        <input type="hidden"
               id="seatNumber"
               name="seatNumber">

        <div class="seat-map">

            <button type="button" class="seat" onclick="selectSeat(this)">A1</button>
            <button type="button" class="seat" onclick="selectSeat(this)">A2</button>
            <button type="button" class="seat" onclick="selectSeat(this)">A3</button>
            <button type="button" class="seat" onclick="selectSeat(this)">A4</button>

            <button type="button" class="seat" onclick="selectSeat(this)">B1</button>
            <button type="button" class="seat" onclick="selectSeat(this)">B2</button>
            <button type="button" class="seat" onclick="selectSeat(this)">B3</button>
            <button type="button" class="seat" onclick="selectSeat(this)">B4</button>

            <button type="button" class="seat" onclick="selectSeat(this)">C1</button>
            <button type="button" class="seat" onclick="selectSeat(this)">C2</button>
            <button type="button" class="seat" onclick="selectSeat(this)">C3</button>
            <button type="button" class="seat" onclick="selectSeat(this)">C4</button>

        </div>

        <button type="submit" class="btn btn-primary mt-4">
            Continue to Payment
        </button>

    </form>

</div>

<script>
function selectSeat(button){

    document.querySelectorAll('.seat').forEach(seat=>{
        seat.classList.remove('selected');
    });

    button.classList.add('selected');

    document.getElementById('seatNumber').value =
        button.innerText;
}
</script>

</body>
</html>
