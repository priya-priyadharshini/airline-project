<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Ticket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/book-ticket.css}">
</head>
<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5 book-ticket-container">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">Book Ticket ✈</h2>

        <form action="/book"
              method="post"
              th:object="${reservation}">

            <input type="hidden" th:field="*{flightId}">

            <input class="form-control mb-3"
                   th:field="*{passengerId}"
                   placeholder="Passenger ID">

            <input class="form-control mb-3"
                   th:field="*{seatNumber}"
                   placeholder="Seat Number">

            <button type="submit" class="btn btn-success w-100">
                Confirm Booking
            </button>

        </form>

    </div>
</div>

</body>
</html>
