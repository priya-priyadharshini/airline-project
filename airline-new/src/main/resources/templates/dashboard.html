<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#eaf4ff,#ffffff);
            min-height:100vh;
        }

        .dashboard-card{
            border:none;
            border-radius:18px;
            transition:0.3s;
            box-shadow:0 8px 20px rgba(0,0,0,0.08);
        }

        .dashboard-card:hover{
            transform:translateY(-8px);
        }

        .icon{
            font-size:48px;
        }

        .dashboard-link{
            text-decoration:none;
            color:black;
        }

        .dashboard-link-secondary{
            text-decoration:none;
            color:black;
        }
    </style>
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">

    <div class="text-center mb-5">
        <h1>Welcome to Airline Reservation System ✈</h1>
        <p class="text-muted">
            Search, book and manage your flights easily
        </p>
    </div>

    <div class="row g-4">

        <div class="col-md-3">
            <a href="/search-flights" class="dashboard-link">
                <div class="card dashboard-card p-4 text-center">
                    <div class="icon">✈</div>
                    <h4 class="mt-3">Search Flights</h4>
                </div>
            </a>
        </div>

        <div class="col-md-3">
            <a href="/booking-history" class="dashboard-link-secondary">
                <div class="card dashboard-card p-4 text-center">
                    <div class="icon">🎟</div>
                    <h4 class="mt-3">My Bookings</h4>
                </div>
            </a>
        </div>

        <div class="col-md-3">
            <a href="/admin" class="dashboard-link-secondary">
                <div class="card dashboard-card p-4 text-center">
                    <div class="icon">⚙</div>
                    <h4 class="mt-3">Admin Panel</h4>
                </div>
            </a>
        </div>

        <div class="col-md-3">
            <a href="/login" class="dashboard-link-secondary">
                <div class="card dashboard-card p-4 text-center">
                    <div class="icon">🚪</div>
                    <h4 class="mt-3">Logout</h4>
                </div>
            </a>
        </div>

    </div>

</div>

</body>
</html>
