<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Flight</title>
       <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
       <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5 max-width-700">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">✈ Add New Flight</h2>

        <form action="/add-flight"
              method="post"
              th:object="${flight}">

            <input type="text"
                   th:field="*{flightName}"
                   class="form-control mb-3"
                   placeholder="Flight Name"
                   required>

            <input type="text"
                   th:field="*{source}"
                   class="form-control mb-3"
                   placeholder="Source"
                   required>

            <input type="text"
                   th:field="*{destination}"
                   class="form-control mb-3"
                   placeholder="Destination"
                   required>

            <div class="mb-3">
                <label for="departureTime" class="form-label">Departure Time</label>
                <input id="departureTime"
                       type="datetime-local"
                       th:field="*{departureTime}"
                       class="form-control"
                       title="Departure date and time"
                       placeholder="Departure Time">
            </div>

            <div class="mb-3">
                <label for="arrivalTime" class="form-label">Arrival Time</label>
                <input id="arrivalTime"
                       type="datetime-local"
                       th:field="*{arrivalTime}"
                       class="form-control"
                       title="Arrival date and time"
                       placeholder="Arrival Time">
            </div>

            <input type="number"
                   th:field="*{seatsAvailable}"
                   class="form-control mb-3"
                   placeholder="Available Seats">

            <input type="number"
                   step="0.01"
                   th:field="*{price}"
                   class="form-control mb-3"
                   placeholder="Ticket Price">

            <button type="submit"
                    class="btn btn-success w-100">
                Add Flight
            </button>

        </form>

    </div>
</div>

</body>
</html>
