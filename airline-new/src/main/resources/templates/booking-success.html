<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Ticket Confirmation</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#dbeafe,#f8fafc);
            min-height:100vh;
        }

        .ticket{
            background:white;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.15);
            overflow:hidden;
        }

        .ticket-header{
            background:#0d6efd;
            color:white;
            padding:20px;
        }

        .pnr{
            font-size:28px;
            font-weight:bold;
            color:#0d6efd;
        }

        .status{
            font-size:20px;
            color:green;
            font-weight:600;
        }
    </style>

</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="ticket">

                <div class="ticket-header text-center">
                    <h2>✈ Flight Ticket Confirmed</h2>
                </div>

                <div class="p-4">

                    <div class="row mb-4">

                        <div class="col-md-6">
                            <h5>Passenger</h5>
                            <p th:text="${passengerName}">Passenger Name</p>
                        </div>

                        <div class="col-md-6 text-end">
                            <h5>Seat Number</h5>
                            <p th:text="${seatNumber}">A12</p>
                        </div>

                    </div>

                    <hr>

                    <div class="row mb-4">

                        <div class="col-md-6">
                            <h5>Flight Number</h5>
                            <p th:text="${flightId}"></p>
                        </div>

                        <div class="col-md-6 text-end">
                            <h5>Booking Date</h5>
                            <p th:text="${bookingDate}"></p>
                        </div>

                    </div>

                    <div class="text-center mt-4">
                        <p>Your PNR Number</p>

                        <div class="pnr"
                             th:text="${pnr}">
                        </div>

                        <div class="status mt-3">
                            Confirmed ✅
                        </div>
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
