<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/admin-dashboard.css">

    <style>
        body{
            background: linear-gradient(135deg,#eef4ff,#ffffff);
            min-height:100vh;
        }

        .admin-card{
            border:none;
            border-radius:20px;
            box-shadow:0 8px 20px rgba(0,0,0,0.08);
            transition:0.3s;
        }

        .admin-card:hover{
            transform:translateY(-8px);
        }

        .icon{
            font-size:48px;
        }

        .dashboard-link{
            text-decoration:none;
            color:black;
        }
    </style>
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">

    <div class="text-center mb-5">
        <h1>Admin Dashboard ⚙️</h1>
        <p class="text-muted">
            Manage flights and reservations
        </p>
    </div>

    <div class="row g-4 justify-content-center">

        <div class="col-md-4">
            <a href="/add-flight" class="dashboard-link">
                <div class="card admin-card p-4 text-center">
                    <div class="icon">✈</div>
                    <h4 class="mt-3">Add Flight</h4>
                </div>
            </a>
        </div>

        <div class="col-md-4">
            <a href="/admin-flights" class="dashboard-link">
                <div class="card admin-card p-4 text-center">
                    <div class="icon">🛫</div>
                    <h4 class="mt-3">Manage Flights</h4>
                </div>
            </a>
        </div>

        <div class="col-md-4">
            <a href="/booking-history" class="dashboard-link">
                <div class="card admin-card p-4 text-center">
                    <div class="icon">📋</div>
                    <h4 class="mt-3">View Bookings</h4>
                </div>
            </a>
        </div>

    </div>

</div>

</body>
</html>
