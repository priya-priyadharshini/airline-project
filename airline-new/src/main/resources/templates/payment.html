<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Secure Payment</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#dbeafe,#f8fafc);
            min-height:100vh;
        }

        .payment-card{
            border:none;
            border-radius:20px;
            box-shadow:0 12px 30px rgba(0,0,0,0.12);
        }

        .section{
            display:none;
        }
    </style>
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card payment-card p-4">

                <h2 class="text-center mb-4">Secure Payment 💳</h2>

                <form action="/payment-success" method="post">

                    <div class="mb-4">
                        <label for="paymentMethod" class="form-label">Select Payment Method</label>

                        <select id="paymentMethod"
                                name="paymentMethod"
                                class="form-select"
                                onchange="showPaymentFields()"
                                aria-label="Select Payment Method">

                            <option value="">Choose Payment Method</option>
                            <option value="upi">UPI</option>
                            <option value="card">Card</option>
                            <option value="cash">Cash</option>
                        </select>
                    </div>

                    <!-- UPI -->
                    <div id="upiSection" class="section">

                        <label for="upiIdInput">Enter UPI ID</label>

                        <input id="upiIdInput"
                               type="text"
                               name="upiId"
                               class="form-control mb-3"
                               placeholder="example@upi"
                               title="Enter your UPI ID">

                    </div>

                    <!-- CARD -->
                    <div id="cardSection" class="section">

                           <label for="cardHolderNameInput">Card Holder Name</label>
                           <input id="cardHolderNameInput"
                               type="text"
                               name="cardHolderName"
                               class="form-control mb-3"
                               placeholder="Card Holder Name"
                               title="Enter name as on card">

                           <label for="cardNumberInput">Card Number</label>
                           <input id="cardNumberInput"
                               type="text"
                               name="cardNumber"
                               maxlength="16"
                               class="form-control mb-3"
                               placeholder="Card Number"
                               title="Enter 16 digit card number">

                        <div class="row">

                            <div class="col-md-6">
                                    <label for="expiryInput">Expiry</label>
                                    <input id="expiryInput"
                                        type="text"
                                        name="expiry"
                                        class="form-control mb-3"
                                        placeholder="MM/YY"
                                        title="Enter expiry in MM/YY format">
                            </div>

                            <div class="col-md-6">
                                    <label for="cvvInput">CVV</label>
                                    <input id="cvvInput"
                                        type="password"
                                        name="cvv"
                                        maxlength="3"
                                        class="form-control mb-3"
                                        placeholder="CVV"
                                        title="Enter 3 digit CVV">
                            </div>

                        </div>

                    </div>

                    <!-- CASH -->
                    <div id="cashSection" class="section">

                        <div class="alert alert-info">
                            Cash payment can be completed at airport check-in counter.
                        </div>

                    </div>

                    <div class="mb-3">
                        <label>Total Amount</label>
                        <input class="form-control"
                               value="₹4500"
                               placeholder="Total Amount"
                               title="Total amount payable"
                               readonly>
                    </div>

                    <button type="submit"
                            class="btn btn-success w-100">
                        Pay Now
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

<script>
function showPaymentFields() {
    const method = document.getElementById("paymentMethod").value;

    document.getElementById("upiSection").style.display = "none";
    document.getElementById("cardSection").style.display = "none";
    document.getElementById("cashSection").style.display = "none";

    if(method === "upi"){
        document.getElementById("upiSection").style.display = "block";
    }

    if(method === "card"){
        document.getElementById("cardSection").style.display = "block";
    }

    if(method === "cash"){
        document.getElementById("cashSection").style.display = "block";
    }
}
</script>

</body>
</html>
