<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container d-flex flex-column justify-content-center align-items-center full-height">

    <h1 class="brand-title">✈ Airline Reservation System</h1>
    <p class="tagline">Book your journey with comfort and confidence</p>

    <div class="auth-box auth-box-wide">

        <h3 class="text-center mb-4">Login</h3>

        <form action="/login" method="post">

            <input type="email"
                   name="email"
                   class="form-control mb-3"
                   placeholder="Email"
                   required>

            <input type="password"
                   name="password"
                   class="form-control mb-3"
                   placeholder="Password"
                   required>

            <button type="submit" class="btn btn-primary w-100">
                Login
            </button>

        </form>

        <div class="text-center mt-3">
            <a href="/register">Create Account</a>
        </div>

    </div>

</div>

</body>
</html>
